name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./employeemanagement-frontend # This defines where your source code is
          file: ./employeemanagement-frontend/Dockerfile # This points to the Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}

      - name: Update GitOps Repo
        run: |
          git config --global user.email "nayakvnitha413@gmail.com"
          git config --global user.name "Vinitha-Nayak"
          # Updating the manifest with the new Docker Hub image path
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}|g" k8s/frontend/frontend-rollout.yaml          
          git add k8s/frontend/frontend-rollout.yaml
          git commit -m "Bump image to ${{ github.sha }}"
          git push
