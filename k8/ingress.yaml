apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emp-ingress
  annotations:
    # This strips "/employee" from the path before sending it to the backend
    # So the backend sees GET / instead of GET /employee
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx # Modern replacement for kubernetes.io/ingress.class
  rules:
  - http:
      paths:
      - path: /employee
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000