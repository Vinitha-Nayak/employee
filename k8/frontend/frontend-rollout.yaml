apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vinithaaws/my-app:372ce73d7719c96ce9ddf85e97f2d8926b235947
        ports:
        - containerPort: 3000
  strategy:
    canary:
      stableService: frontend
      canaryService: frontend-canary
      trafficRouting:
        nginx:
          stableIngress: emp-ingress
      # Corrected: analysis belongs inside the canary block
      analysis:
        templates:
          - templateName: success-rate-check
        # Optional: args to pass if your template uses them
        # args:
        #   - name: service-name
        #     value: frontend-canary
      steps:
      - setWeight: 20
      - pause: {} # This pauses until you manually promote in ArgoCD UI
      - setWeight: 50
      - pause: { duration: 2m }
      - setWeight: 100